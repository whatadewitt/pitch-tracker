<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d2e" />
  <title>Pitch Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pitch Tracker" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9" />
        <path d="M6 5.5c2.4 2.2 2.4 10.8 0 13" />
        <path d="M18 5.5c-2.4 2.2-2.4 10.8 0 13" />
      </svg>
      Pitch Tracker
    </h1>
  </header>

  <main id="view" class="view"><!-- rendered by app.js --></main>

  <nav class="tabbar" id="tabbar" aria-label="Primary">
    <button class="tab" data-tab="track">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="7" />
        <line x1="12" y1="1.5" x2="12" y2="5" /><line x1="12" y1="19" x2="12" y2="22.5" />
        <line x1="1.5" y1="12" x2="5" y2="12" /><line x1="19" y1="12" x2="22.5" y2="12" />
        <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none" />
      </svg>
      <span>Track</span>
    </button>
    <button class="tab" data-tab="status">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="5" y="5" width="14" height="16" rx="2" />
        <path d="M9 5V4a3 3 0 0 1 6 0v1" />
        <line x1="8.5" y1="11" x2="15.5" y2="11" /><line x1="8.5" y1="15" x2="13" y2="15" />
      </svg>
      <span>Status</span>
    </button>
    <button class="tab" data-tab="roster">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="8" r="3.2" />
        <path d="M3.5 20a5.5 5.5 0 0 1 11 0" />
        <path d="M16 5.3a3.2 3.2 0 0 1 0 5.4" />
        <path d="M17 14.6a5.5 5.5 0 0 1 3.5 5.4" />
      </svg>
      <span>Roster</span>
    </button>
    <button class="tab" data-tab="rules">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" y1="8" x2="20" y2="8" /><line x1="4" y1="16" x2="20" y2="16" />
        <circle cx="9" cy="8" r="2.5" fill="var(--surface)" />
        <circle cx="15" cy="16" r="2.5" fill="var(--surface)" />
      </svg>
      <span>Rules</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
