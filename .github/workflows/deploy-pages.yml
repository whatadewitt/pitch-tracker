name: Deploy to GitHub Pages

# Publishes the static Pitch Tracker app to GitHub Pages. Runs on every push
# to the development branch and can be triggered manually. Pages is enabled
# automatically by the configure-pages step, so no repo setting changes are
# required up front.
on:
  push:
    branches: ["claude/baseball-pitch-tracker-KyzDJ"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html styles.css app.js manifest.json icon.svg sw.js _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
